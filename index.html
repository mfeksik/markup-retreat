<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markup retreat</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="rating">
        <div class="star-rating">
            <input type="radio" name="rating" id="star1" value="1">
            <label for="star1">
                <img src="img/star-empty.svg" alt="1" class="star-empty">
                <img src="img/star.svg" alt="1" class="star-filled">
            </label>

            <input type="radio" name="rating" id="star2" value="2">
            <label for="star2">
                <img src="img/star-empty.svg" alt="2" class="star-empty">
                <img src="img/star.svg" alt="2" class="star-filled">
            </label>

            <input type="radio" name="rating" id="star3" value="3">
            <label for="star3">
                <img src="img/star-empty.svg" alt="3" class="star-empty">
                <img src="img/star.svg" alt="3" class="star-filled">
            </label>

            <input type="radio" name="rating" id="star4" value="4">
            <label for="star4">
                <img src="img/star-empty.svg" alt="4" class="star-empty">
                <img src="img/star.svg" alt="4" class="star-filled">
            </label>

            <input type="radio" name="rating" id="star5" value="5">
            <label for="star5">
                <img src="img/star-empty.svg" alt="5" class="star-empty">
                <img src="img/star.svg" alt="5" class="star-filled">
            </label>
        </div>
    </div>
</body>
</html>
